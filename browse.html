<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse thousands of free books on OpenPage — classics, fiction, non-fiction, and more.">
  <title>Browse Books — OpenPage</title>
  <link rel="stylesheet" href="/src/css/global.css">
  <link rel="icon" href="/logo-icon.svg" type="image/svg+xml">
  <link rel="icon" href="/logo-icon.png" type="image/png" sizes="32x32">
  <meta name="theme-color" content="#1a2a6c" id="theme-color">
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>

  <header class="site-header" role="banner">
    <div class="header-inner">
      <a href="/" class="site-logo" aria-label="OpenPage Home">
        <img src="/logo-icon.svg" alt="" width="32" height="32" />
        <span class="logo-text">OpenPage</span>
      </a>
      <form class="search-form" role="search" action="/search.html" method="GET">
        <label for="search-input" class="sr-only">Search books</label>
        <input id="search-input" class="search-input" type="search" name="q" placeholder="Search titles, authors…" autocomplete="off" />
        <button type="submit" class="search-btn" aria-label="Search"><span>Search</span></button>
      </form>
      <nav class="nav-links" aria-label="Main navigation">
        <a href="/browse.html" aria-current="page">Browse</a>
        <a href="/about.html">About</a>
        <a href="https://ko-fi.com/openpage" target="_blank" rel="noopener" class="nav-donate" aria-label="Support OpenPage on Ko-fi">
          <img src="/icons/donate.svg" alt="" width="16" height="16" aria-hidden="true" />
          <span>Support</span>
        </a>
        <button id="theme-toggle" class="theme-toggle-btn" type="button" aria-label="Switch to dark mode" title="Switch to dark mode">
          <img src="/icons/moon.svg" alt="" width="20" height="20" aria-hidden="true" />
        </button>
      </nav>
    </div>
  </header>

  <main id="main" class="main-content">
    <div class="page-hero" style="padding-bottom:var(--space-4)">
      <h1>Browse Books</h1>
      <p>Discover timeless classics and open-licensed works.</p>
    </div>

    <!-- Category pills with genre covers -->
    <div class="category-pills" role="tablist" aria-label="Book categories">
      <a href="?topic=" class="category-pill category-pill--all" data-topic="" aria-current="true">
        <span class="category-pill-label">All</span>
      </a>
      <a href="?topic=fiction" class="category-pill category-pill--fiction" data-topic="fiction">
        <span class="category-pill-label">Fiction</span>
      </a>
      <a href="?topic=drama" class="category-pill category-pill--drama" data-topic="drama">
        <span class="category-pill-label">Drama</span>
      </a>
      <a href="?topic=philosophy" class="category-pill category-pill--philosophy" data-topic="philosophy">
        <span class="category-pill-label">Philosophy</span>
      </a>
      <a href="?topic=poetry" class="category-pill category-pill--poetry" data-topic="poetry">
        <span class="category-pill-label">Poetry</span>
      </a>
      <a href="?topic=history" class="category-pill category-pill--history" data-topic="history">
        <span class="category-pill-label">History</span>
      </a>
      <a href="?topic=science" class="category-pill category-pill--science" data-topic="science">
        <span class="category-pill-label">Science</span>
      </a>
      <a href="?topic=children" class="category-pill category-pill--children" data-topic="children">
        <span class="category-pill-label">Children</span>
      </a>
    </div>

    <div id="book-grid" class="book-grid" role="list" aria-label="All books">
      <!-- Books rendered by JavaScript -->
    </div>

    <div id="load-more-container" style="text-align:center;padding:var(--space-6) 0;">
      <button id="load-more-btn" class="read-now-btn" style="background:var(--color-bg-alt);color:var(--color-text);border:1px solid var(--color-border)">
        Load More Books ↓
      </button>
    </div>
  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="footer-inner">
      <nav class="footer-links" aria-label="Footer navigation">
        <a href="/about.html">About</a>
        <a href="/about.html#privacy">Privacy</a>
      </nav>
      <p>OpenPage — free books from Project Gutenberg and open libraries. 📚</p>
    </div>
  </footer>

  <script type="module">
    import { fetchBooks, renderBookGrid, createBookCard } from '/src/js/main.js';
    import { initTheme } from '/src/js/theme.js';

    initTheme();

    const grid = document.getElementById('book-grid');
    const loadMoreBtn = document.getElementById('load-more-btn');
    let offset = 0;
    const limit = 24;
    let loading = false;

    // Category filtering via URL params (visual only for now — real filtering needs topic API)
    const params = new URLSearchParams(window.location.search);
    const topic = params.get('topic') || '';
    document.querySelectorAll('.category-pill').forEach(pill => {
      pill.removeAttribute('aria-current');
      if (pill.dataset.topic === topic) {
        pill.setAttribute('aria-current', 'true');
      }
    });

    async function loadBooks(reset = false) {
      if (loading) return;
      loading = true;
      loadMoreBtn.disabled = true;
      loadMoreBtn.textContent = 'Loading…';

      if (reset) {
        offset = 0;
        grid.innerHTML = Array(limit).fill('').map(() =>
          `<article class="book-card" aria-hidden="true">
            <div class="book-cover skeleton"></div>
            <div class="book-info">
              <div class="skeleton" style="height:1rem;width:80%;margin-bottom:0.25rem"></div>
              <div class="skeleton" style="height:0.75rem;width:60%"></div>
            </div>
          </article>`
        ).join('');
      }

      const books = await fetchBooks(limit, offset);
      offset += books.length;

      if (reset) {
        renderBookGrid(books, grid);
      } else {
        // Append
        const fragment = document.createDocumentFragment();
        books.forEach(book => {
          fragment.appendChild(createBookCard(book));
        });
        grid.appendChild(fragment);
      }

      loading = false;
      loadMoreBtn.disabled = false;
      loadMoreBtn.textContent = 'Load More Books ↓';

      if (books.length < limit) {
        loadMoreBtn.style.display = 'none';
      }
    }

    // Initial load
    loadBooks(true);

    loadMoreBtn.addEventListener('click', () => loadBooks(false));
  </script>
</body>
</html>
